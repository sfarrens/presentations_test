name: Deploy Presentations to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Clone reveal.js
        run: git clone --depth 1 --branch 3.7.0 https://github.com/hakimel/reveal.js.git reveal.js

      - name: Build presentations
        run: |
          pip3 install pyyaml --quiet
          mkdir -p _site

          REPO_SLUG="${GITHUB_REPOSITORY#*/}"

          # Generate the landing page from each presentation's _config.yml
          python3 .github/scripts/build_index.py

          for dir in */; do
            name="${dir%/}"
            if [ ! -f "${name}/_config.yml" ]; then
              continue
            fi
            echo "Building presentation: ${name}"
            if [ -d "${name}/_layouts" ]; then
              # Presentation has its own theme — build as-is
              cp -r reveal.js "${name}/reveal.js"
              bundle exec jekyll build \
                --source "${name}" \
                --destination "_site/${name}" \
                --baseurl "/${REPO_SLUG}/${name}"
              rm -rf "${name}/reveal.js"
            else
              # Use shared theme — assemble into a temp directory and build
              BUILD_DIR=$(mktemp -d)
              cp -r _theme/. "${BUILD_DIR}/"
              cp -r reveal.js "${BUILD_DIR}/reveal.js"
              [ -d "${name}/_slides" ]   && cp -r "${name}/_slides"   "${BUILD_DIR}/"
              [ -d "${name}/graphics" ]  && cp -r "${name}/graphics"  "${BUILD_DIR}/"
              bundle exec jekyll build \
                --source "${BUILD_DIR}" \
                --destination "_site/${name}" \
                --baseurl "/${REPO_SLUG}/${name}" \
                --config "_base_config.yml,${name}/_config.yml"
              rm -rf "${BUILD_DIR}"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

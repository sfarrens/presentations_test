# Your presentation title
title: Dummy Presentation

# Your presentation description (optional)
description: A dummy presentation to demonstrate the multi-presentation setup

# Your name (optional)
author: Samuel Farrens

# The Reveal theme
reveal_theme: sfarrens.css

# The Reveal transition
reveal_transition: fade

# Path to the used theme (defaults to the Reveal.js standard theme path)
reveal_theme_path: assets/css/

# Additional custom CSS paths
extra_css:

# Custom CSS for highlighting
highlight_style_sheet: assets/css/highlight.css

# Embed Server-side speaker notes?
reveal_notes_server: false

# Additional reveal.js options
reveal_options:
  width: 100%
  height: 100%
  slideNumber: false
  transition: 'fade'
  margin: 0.18

# Additional reveal.js dependencies
reveal_dependencies:
  - "{ src: 'reveal.js/plugin/math/math.js'},"

# Reveal.js subdirectory
reveal_path: reveal.js/

# mermaid.js diagram integration
mermaid_diagrams: true
mermaid_theme: dark

# Slides collection
collections:
  slides:
    output: false

# Exclude directories and/or files from the conversion
exclude:
  - Gemfile*
  - LICENSE
  - README.md

# Don't change anything below
markdown: kramdown
highlighter: rouge
markdown_ext: ignoreme
